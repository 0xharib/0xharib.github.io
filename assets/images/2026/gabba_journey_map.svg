<svg viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efdd"/>
      <stop offset="100%" stop-color="#ece0bf"/>
    </linearGradient>
  </defs>
  <rect width="800" height="460" fill="url(#paper)"/>
  <text x="400" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#1c3a5e" font-weight="bold">The Long Way Back</text>
  <text x="400" y="76" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#7a6a3c" letter-spacing="2">BORDER-GAVASKAR TROPHY · DEC 2020 – JAN 2021</text>

  <!-- simplified Australia coastline arc -->
  <path d="M 90 330 Q 220 380 360 360 Q 520 340 700 270" fill="none" stroke="#b9a36a" stroke-width="2" stroke-dasharray="2 6"/>

  <!-- path line -->
  <path d="M 150 300 L 330 330 L 470 250 L 640 150" fill="none" stroke="#9b2226" stroke-width="3" stroke-dasharray="8 6"/>

  <!-- Adelaide -->
  <circle cx="150" cy="300" r="10" fill="#9b2226"/>
  <text x="150" y="335" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1c3a5e" font-weight="bold">Adelaide</text>
  <text x="150" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">36 all out · lost</text>

  <!-- Melbourne -->
  <circle cx="330" cy="330" r="10" fill="#1c7a3e"/>
  <text x="330" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1c3a5e" font-weight="bold">Melbourne</text>
  <text x="330" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Rahane 112 · won</text>

  <!-- Sydney -->
  <circle cx="470" cy="250" r="10" fill="#c08a1e"/>
  <text x="470" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#1c3a5e" font-weight="bold">Sydney</text>
  <text x="470" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">Vihari &amp; Ashwin · drawn</text>

  <!-- Brisbane -->
  <circle cx="640" cy="150" r="13" fill="#9b2226"/>
  <circle cx="640" cy="150" r="20" fill="none" stroke="#9b2226" stroke-width="2" opacity="0.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1c3a5e" font-weight="bold">Brisbane</text>
  <text x="640" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#555">The Gabba falls · won</text>

  <text x="400" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#7a6a3c" font-style="italic">Four Tests, one continent, thirty-one days.</text>
</svg>
