<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1c33"/>
      <stop offset="100%" stop-color="#1c3a5e"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#06090d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#sky)"/>
  <!-- floodlight glow -->
  <circle cx="120" cy="60" r="90" fill="#ffe9b3" opacity="0.08"/>
  <circle cx="700" cy="50" r="110" fill="#ffe9b3" opacity="0.08"/>

  <!-- scoreboard -->
  <rect x="120" y="80" width="560" height="240" rx="10" fill="url(#board)" stroke="#c9971c" stroke-width="3"/>
  <text x="400" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#e7c66b" letter-spacing="3">ADELAIDE OVAL · DAY 3</text>
  <line x1="150" y1="148" x2="650" y2="148" stroke="#c9971c" stroke-width="1.5" opacity="0.6"/>

  <text x="400" y="240" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="120" fill="#f3e7c9">36</text>
  <text x="400" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#e7c66b" letter-spacing="6">ALL OUT</text>

  <text x="400" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#9fb6cf">India's lowest Test total · 19 December 2020</text>

  <!-- stumps silhouette -->
  <g transform="translate(360,330)" opacity="0.85">
    <rect x="0" y="0" width="4" height="42" fill="#caa24a"/>
    <rect x="16" y="0" width="4" height="42" fill="#caa24a"/>
    <rect x="32" y="0" width="4" height="42" fill="#caa24a"/>
    <rect x="-2" y="-6" width="42" height="6" fill="#caa24a"/>
  </g>
</svg>
