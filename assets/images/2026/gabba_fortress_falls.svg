<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a4c"/>
      <stop offset="55%" stop-color="#ffb56b"/>
      <stop offset="100%" stop-color="#fde6b0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="440" fill="url(#dawn)"/>
  <circle cx="400" cy="190" r="80" fill="#fff4d6" opacity="0.85"/>

  <!-- fortress / Gabba silhouette, cracked -->
  <g fill="#1c1208" opacity="0.92">
    <rect x="120" y="230" width="560" height="120" rx="6"/>
    <rect x="150" y="180" width="40" height="60"/>
    <rect x="230" y="170" width="40" height="70"/>
    <rect x="310" y="160" width="40" height="80"/>
    <rect x="390" y="150" width="40" height="90"/>
    <rect x="470" y="160" width="40" height="80"/>
    <rect x="550" y="170" width="40" height="70"/>
    <rect x="610" y="180" width="40" height="60"/>
  </g>

  <!-- crack -->
  <path d="M 400 150 L 388 220 L 410 260 L 392 350" fill="none" stroke="#fde6b0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 400 150 L 388 220 L 410 260 L 392 350" fill="none" stroke="#9b2226" stroke-width="2" stroke-linecap="round"/>

  <!-- bat raised, simple figure -->
  <g transform="translate(400,355)">
    <circle cx="0" cy="-8" r="9" fill="#1c1208"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#1c1208" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="6" x2="-22" y2="-18" stroke="#1c1208" stroke-width="5" stroke-linecap="round"/>
    <line x1="-22" y1="-18" x2="-30" y2="-46" stroke="#caa24a" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="6" x2="18" y2="22" stroke="#1c1208" stroke-width="5" stroke-linecap="round"/>
  </g>

  <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#3a2410" font-weight="bold" letter-spacing="2">THE GABBATOIR FALLS</text>
  <text x="400" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#5a3e1c">19 January 2021 · 32 years unbeaten, undone in an afternoon</text>
</svg>
